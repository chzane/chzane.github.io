    <script>
      function reg(){
        var name = document.getElementById('name').value;
        var psw = document.getElementById('psw').value;
        var pswt = document.getElementById('pswt').value;
        if (name == '' && psw == '' && pswt == ''){
          alert('请输入电子邮箱和账号密码！');
        }else if(name == ''){
          alert('请输入电子邮箱！');
        }else if(psw == ''){
          alert('请输入密码！');
        }else if(psw != pswt){
          alert('两次输入的密码不一致！')
        }else{
          location.href='/api/register0.html?name=' + name + '&psw=' + psw;
        }
      }
    </script>
